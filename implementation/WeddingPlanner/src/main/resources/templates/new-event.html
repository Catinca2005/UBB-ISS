<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventStudio - New Event</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-image: url('/background.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
        }
        .body-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(253, 251, 247, 0.85); z-index: -1;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 2rem;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

<div class="body-overlay"></div>

<div class="card p-12 shadow-2xl max-w-xl w-full mx-4 border border-rose-100">
    <div class="text-center mb-8">
        <h1 class="font-serif text-4xl text-gray-800 mb-2">Plan a New Event</h1>
        <p class="text-sm text-gray-500 uppercase tracking-widest">Every detail matters</p>
    </div>

    <form th:action="@{/events/new}" method="POST" class="space-y-6">

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1 ml-1">Event Name</label>
            <input type="text" name="name" required placeholder="e.g. Catinca & Andrei's Wedding"
                   class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-[#C87D87] focus:border-[#C87D87] transition-colors">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1 ml-1">Event Date</label>
            <input type="date" name="eventDate" required
                   class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-[#C87D87] focus:border-[#C87D87] transition-colors">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1 ml-1">Total Estimated Budget ($)</label>
            <input type="number" step="0.01" name="totalBudget" required placeholder="e.g. 25000"
                   class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-[#C87D87] focus:border-[#C87D87] transition-colors">
        </div>

        <div class="flex gap-4 mt-8">
            <a href="/dashboard" class="w-1/3 py-3.5 text-center text-gray-600 font-semibold rounded-full hover:bg-gray-100 transition-all">Cancel</a>
            <button type="submit" class="w-2/3 py-3.5 bg-[#C87D87] text-white rounded-full font-semibold shadow-lg hover:bg-[#b86a76] transition-all">
                Save Event
            </button>
        </div>
    </form>
</div>

</body>
</html>
